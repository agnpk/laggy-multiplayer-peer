name: Build GDExtension (all platforms)
on:
  push:
    tags:
      - "*"
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # A build is made for every possible combination of parameters
        # You can add or remove entries from the arrays of each parameter to customize which builds you want to run
        # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/running-variations-of-jobs-in-a-workflow
        target:
          [
            { platform: linux, arch: x86_64, os: ubuntu-22.04 },
            { platform: linux, arch: arm64, os: ubuntu-22.04-arm },
            { platform: windows, arch: x86_64, os: windows-latest },
            { platform: windows, arch: arm64, os: windows-latest },
            { platform: macos, arch: universal, os: macos-latest },
            { platform: android, arch: x86_64, os: ubuntu-22.04 },
            { platform: android, arch: arm64, os: ubuntu-22.04 },
            { platform: ios, arch: arm64, os: macos-latest },
            { platform: web, arch: wasm32, os: ubuntu-22.04 },
          ]
        target-type: [ template_debug, template_release ]
        float-precision: [ single ]

    runs-on: ${{ matrix.target.os }}
    steps:
      # Clone this repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # Setup dependencies
      - name: Setup godot-cpp
        uses: ./godot-cpp/.github/actions/setup-godot-cpp
        with:
          platform: ${{ matrix.target.platform }}

      # Build GDExtension (with caches)
      - name: Restore .scons_cache
        uses: ./godot-cpp/.github/actions/godot-cache-restore
        with:
          scons-cache: ${{ github.workspace }}/.scons-cache/
          cache-name: ${{ matrix.target.platform }}_${{ matrix.target.arch }}_${{ matrix.float-precision }}_${{ matrix.target-type }}

      - name: Build GDExtension Debug Build
        shell: sh
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/
        run: |
          scons target=${{ matrix.target-type }} platform=${{ matrix.target.platform }} arch=${{ matrix.target.arch }} precision=${{ matrix.float-precision }}

      - name: Save .scons_cache
        uses: ./godot-cpp/.github/actions/godot-cache-save
        with:
          scons-cache: ${{ github.workspace }}/.scons-cache/
          cache-name: ${{ matrix.target.platform }}_${{ matrix.target.arch }}_${{ matrix.float-precision }}_${{ matrix.target-type }}

      # Package files as an addon
      - name: Package Addon
        shell: bash
        run: |
          mkdir -p artifact/addons/laggy-multiplayer-peer/demo
          mv demo/bin artifact/addons/laggy-multiplayer-peer/bin
          mv demo/scenes artifact/addons/laggy-multiplayer-peer/demo/scenes
          shopt -s nullglob
          for file in demo/check_extension.*; do mv "$file" artifact/addons/laggy-multiplayer-peer/demo/; done
          find artifact -type f \( -name '*.exp' -or -name '*.lib' -or -name '*.pdb' -or -name '*.a' \) -delete

      - name: Audit Packaged Files
        shell: bash
        run: |
          python - <<'PY'
          import os

          files = []
          for root, _, names in os.walk("artifact"):
              for name in names:
                  path = os.path.join(root, name)
                  files.append((os.path.getsize(path), path))

          for size, path in sorted(files):
              print(f"{size:>12} {path}")
          PY

      # Upload the build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.float-precision }}-${{ matrix.target-type }}
          path: artifact

  # Merges all the build artifacts together into a single godot-cpp-template artifact.
  # If you comment out this step, all the builds will be uploaded individually.
  merge-artifacts:
    runs-on: ubuntu-22.04
    needs: build
    if: ${{ !cancelled() }}
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: LaggyMultiplayerPeer-${{ github.sha }}
          pattern: artifact-*
          delete-merged: true

  # On version tag pushes, download the merged artifact, zip the addon, and publish a GitHub Release.
  publish-release:
    runs-on: ubuntu-22.04
    needs: merge-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Merged Artifact
        uses: actions/download-artifact@v4
        with:
          name: LaggyMultiplayerPeer-${{ github.sha }}
          path: release-artifact

      - name: Zip Addon
        run: |
          cd release-artifact
          find addons -type f \( -name '*.exp' -or -name '*.lib' -or -name '*.pdb' -or -name '*.a' \) -delete
          python - <<'PY'
          import os

          files = []
          for root, _, names in os.walk("addons"):
              for name in names:
                  path = os.path.join(root, name)
                  files.append((os.path.getsize(path), path))

          for size, path in sorted(files):
              print(f"{size:>12} {path}")
          PY
          find addons -type f -print | LC_ALL=C sort | zip -X -9 ../LaggyMultiplayerPeer-${{ github.ref_name }}.zip -@

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LaggyMultiplayerPeer-${{ github.ref_name }}.zip
          generate_release_notes: true
